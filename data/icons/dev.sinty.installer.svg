<svg width="236" height="236" viewBox="0 0 236 236" fill="none" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip_inst)">

<!-- Drive shadow -->
<rect x="38" y="118" width="160" height="84" rx="16" fill="rgba(0,0,0,0.3)" transform="translate(3,4)"/>

<!-- Drive back layer (depth) -->
<rect x="37" y="117" width="162" height="86" rx="17" fill="#1e3a5f"/>

<!-- Drive middle layer -->
<rect x="36" y="115" width="164" height="88" rx="18" fill="#1d4ed8" opacity="0.7"/>

<!-- Drive main body -->
<rect x="38" y="118" width="160" height="84" rx="16" fill="url(#body_inst)"/>

<!-- Light bloom on drive -->
<mask id="mask_inst" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="38" y="118" width="160" height="84">
<rect x="38" y="118" width="160" height="84" rx="16" fill="white"/>
</mask>
<g mask="url(#mask_inst)">
<radialGradient id="bloom_inst" cx="90" cy="128" r="150" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="white" stop-opacity="0.22"/>
<stop offset="100%" stop-color="white" stop-opacity="0"/>
</radialGradient>
<rect x="38" y="118" width="160" height="84" rx="16" fill="url(#bloom_inst)"/>
</g>

<!-- Drive slot + activity LED -->
<rect x="60" y="176" width="116" height="11" rx="5.5" fill="#3b82f6" opacity="0.5"/>
<circle cx="176" cy="138" r="6" fill="#7dd3fc"/>

<!-- Install arrow (download into the drive) -->
<g filter="url(#farrow_inst)">
<rect x="106" y="36" width="24" height="50" rx="6" fill="url(#arrow_inst)"/>
<path d="M88 80 L148 80 L118 114 Z" fill="url(#arrow_inst)"/>
</g>

</g>
<defs>
<linearGradient id="body_inst" x1="118" y1="118" x2="118" y2="202" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#1d4ed8"/>
<stop offset="50%" stop-color="#1e40af"/>
<stop offset="100%" stop-color="#1e3a8a"/>
</linearGradient>
<linearGradient id="arrow_inst" x1="118" y1="36" x2="118" y2="114" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#93c5fd"/>
<stop offset="100%" stop-color="#60a5fa"/>
</linearGradient>
<filter id="farrow_inst" x="82" y="32" width="72" height="92" filterUnits="userSpaceOnUse">
<feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.4)"/>
</filter>
<clipPath id="clip_inst">
<rect width="236" height="236" fill="white"/>
</clipPath>
</defs>
</svg>
